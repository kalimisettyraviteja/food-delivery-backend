spring.application.name=restaurant-service
server.port=8082

# MySQL
##spring.datasource.url=jdbc:mysql://localhost:3306/food_restaurant_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
#spring.datasource.url=jdbc:mysql://localhost:3306/cravyo_restaurant_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#
#spring.datasource.username=root
#spring.datasource.password=Raviteja@1234

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Eureka
eureka.client.service-url.defaultZone=https://eureka-server-b0rq.onrender.com/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#JWT
jwt.secret=yourSuperSecretKeyForJwtTokenGenerationMustBeLongEnough123456
jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB