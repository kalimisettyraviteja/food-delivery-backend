server.port=8083
spring.application.name=order-service

# MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/cravyo_order_db?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=Raviteja@1234


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
#eureka.client.service-url.defaultZone=https://eureka-server-b0rq.onrender.com/eureka/
eureka.client.service-url.defaultZone=https://eureka-server-b0rq.onrender.com/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}


# JWT (same secret as user-service)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Delivery charge
app.delivery.charge=40