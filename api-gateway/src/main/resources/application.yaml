server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service-route
            uri: lb://user-service
            predicates:
              - Path=/api/users/**

          - id: restaurant-public-route
            uri: lb://restaurant-service
            predicates:
              - Path=/api/restaurants/**

          - id: restaurant-admin-route
            uri: lb://restaurant-service
            predicates:
              - Path=/api/admin/restaurants/**

          - id: order-public-route
            uri: lb://order-service
            predicates:
              - Path=/api/orders/**

          - id: order-admin-route
            uri: lb://order-service
            predicates:
              - Path=/api/admin/orders/**

          - id: coupon-public-route
            uri: lb://order-service
            predicates:
              - Path=/api/coupons/**

          - id: coupon-admin-route
            uri: lb://order-service
            predicates:
              - Path=/api/admin/coupons/**

          - id: review-route
            uri: lb://order-service
            predicates:
              - Path=/api/reviews/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG