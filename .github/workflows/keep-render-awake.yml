name: Keep Render Services Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Eureka Server
        run: curl -fsS "https://eureka-server-b0rq.onrender.com/ping" || true

      - name: Ping API Gateway
        run: curl -fsS "https://api-gateway-ftbf.onrender.com/ping" || true

      - name: Ping User Service
        run: curl -fsS "https://user-service-34dd.onrender.com/ping" || true

      - name: Ping Restaurant Service
        run: curl -fsS "https://restaurant-service-i0w7.onrender.com/ping" || true

      - name: Ping Order Service
        run: curl -fsS "https://order-service-nq9z.onrender.com/ping" || true
